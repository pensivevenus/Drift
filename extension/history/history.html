<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Drift — History</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0f0f13;
        --surface: #1a1a24;
        --border: rgba(255, 255, 255, 0.08);
        --text: #f0f0f5;
        --muted: rgba(240, 240, 245, 0.5);
        --accent: #6366f1;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f5f5f7;
          --surface: #fff;
          --border: rgba(0, 0, 0, 0.08);
          --text: #0f0f13;
          --muted: rgba(15, 15, 19, 0.5);
          --accent: #4f46e5;
        }
      }
      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #app {
        max-width: 720px;
        margin: 0 auto;
        padding: 32px 24px;
      }
      #topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 28px;
      }
      h1 {
        font-size: 20px;
        font-weight: 500;
      }
      .back-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--muted);
        font-size: 12px;
        padding: 6px 12px;
        cursor: pointer;
        text-decoration: none;
      }
      .back-btn:hover {
        border-color: var(--accent);
        color: var(--text);
      }
      #session-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .session-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px 18px;
        cursor: pointer;
        transition: border-color 0.15s;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .session-card:hover {
        border-color: var(--accent);
      }
      .session-left {
        flex: 1;
      }
      .session-intention {
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
        margin-bottom: 4px;
      }
      .session-meta {
        font-size: 12px;
        color: var(--muted);
      }
      .session-right {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .session-stat {
        text-align: center;
      }
      .stat-num {
        font-size: 18px;
        font-weight: 500;
        color: var(--text);
      }
      .stat-label {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .interrupt-badge {
        background: rgba(99, 102, 241, 0.15);
        color: var(--accent);
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 20px;
      }
      #empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
        font-size: 14px;
        line-height: 2;
      }
      #loading {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="topbar">
        <h1>Session History</h1>
        <a class="back-btn" href="../newtab/newtab.html">← back</a>
      </div>
      <div id="loading">loading sessions...</div>
      <div id="session-list"></div>
      <div id="empty" style="display: none">
        <p>No sessions yet.</p>
        <p>Open a new tab, set your intention, and start browsing.</p>
      </div>
    </div>
    <script type="module" src="history.js"></script>
  </body>
</html>
