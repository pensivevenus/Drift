<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Drift — Settings</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0f0f13;
        --surface: #1a1a24;
        --border: rgba(255, 255, 255, 0.08);
        --text: #f0f0f5;
        --muted: rgba(240, 240, 245, 0.5);
        --accent: #6366f1;
        --red: #d4766a;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f5f5f7;
          --surface: #fff;
          --border: rgba(0, 0, 0, 0.08);
          --text: #0f0f13;
          --muted: rgba(15, 15, 19, 0.5);
          --accent: #4f46e5;
          --red: #c0392b;
        }
      }
      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #app {
        max-width: 560px;
        margin: 0 auto;
        padding: 32px 24px;
      }
      #topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 28px;
      }
      h1 {
        font-size: 20px;
        font-weight: 500;
      }
      .back-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--muted);
        font-size: 12px;
        padding: 6px 12px;
        cursor: pointer;
        text-decoration: none;
      }
      .back-btn:hover {
        border-color: var(--accent);
        color: var(--text);
      }
      .section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 14px;
      }
      .section-title {
        font-size: 11px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 16px;
      }
      .setting-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
      }
      .setting-row:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }
      .setting-label {
        font-size: 13px;
        color: var(--text);
      }
      .setting-desc {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }
      .setting-control {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      input[type="range"] {
        width: 100px;
        accent-color: var(--accent);
      }
      .range-val {
        font-size: 12px;
        color: var(--muted);
        min-width: 32px;
        text-align: right;
      }
      select {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        font-size: 12px;
        padding: 4px 8px;
        border-radius: 6px;
      }
      .danger-btn {
        background: none;
        border: 1px solid var(--red);
        border-radius: 8px;
        color: var(--red);
        font-size: 13px;
        padding: 10px 20px;
        cursor: pointer;
        width: 100%;
        margin-top: 8px;
        transition: all 0.15s;
      }
      .danger-btn:hover {
        background: var(--red);
        color: white;
      }
      #saved-toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--accent);
        color: white;
        font-size: 12px;
        padding: 8px 18px;
        border-radius: 20px;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
      }
      #saved-toast.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="topbar">
        <h1>Settings</h1>
        <a class="back-btn" href="javascript:history.back()">← back</a>
      </div>

      <div class="section">
        <div class="section-title">Drift Detection</div>
        <div class="setting-row">
          <div>
            <div class="setting-label">Tab threshold</div>
            <div class="setting-desc">
              Number of tabs to open before interrupt fires
            </div>
          </div>
          <div class="setting-control">
            <input
              type="range"
              id="tabs-threshold"
              min="2"
              max="10"
              value="4"
              oninput="update('tabs-threshold', 'tabs-val', this.value)"
            />
            <span class="range-val" id="tabs-val">4</span>
          </div>
        </div>
        <div class="setting-row">
          <div>
            <div class="setting-label">Time window</div>
            <div class="setting-desc">
              Seconds window for counting tab opens
            </div>
          </div>
          <div class="setting-control">
            <input
              type="range"
              id="time-window"
              min="30"
              max="180"
              step="10"
              value="90"
              oninput="update('time-window', 'time-val', this.value + 's')"
            />
            <span class="range-val" id="time-val">90s</span>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Appearance</div>
        <div class="setting-row">
          <div class="setting-label">Theme</div>
          <div class="setting-control">
            <select id="theme-select" onchange="saveSettings()">
              <option value="auto">Auto</option>
              <option value="dark">Dark</option>
              <option value="light">Light</option>
            </select>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Data</div>
        <div class="setting-row">
          <div>
            <div class="setting-label">Session history</div>
            <div class="setting-desc">
              Sessions are stored locally for 30 days
            </div>
          </div>
        </div>
        <button class="danger-btn" onclick="clearData()">
          Delete all session data
        </button>
      </div>
    </div>

    <div id="saved-toast">Settings saved</div>
    <script type="module" src="settings.js"></script>
  </body>
</html>
